# Local Development Docker Compose Configuration
# 
# Build and run with local code changes:
#   docker-compose -f docker-compose.local.yml up -d --build
#
# View logs:
#   docker-compose -f docker-compose.local.yml logs -f new-api
#
# Stop:
#   docker-compose -f docker-compose.local.yml down

version: '3.4'

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile.local
    image: new-api:local
    container_name: new-api-local
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3001:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://root:123456@postgres:5432/new-api
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - RELAY_TIMEOUT=1200
      - STREAMING_TIMEOUT=1200
      - SESSION_SECRET=local-docker-dev-only-change-in-prod
      - GIN_MODE=release
      - RAW_LOG_S3_ENABLED=true
      - RAW_LOG_S3_BUCKET=test-logs
      - RAW_LOG_S3_REGION=us-east-1
      - RAW_LOG_S3_PREFIX=llm-raw-logs
      - RAW_LOG_S3_ENDPOINT=http://localstack:4566
      - RAW_LOG_S3_ACCESS_KEY_ID=test
      - RAW_LOG_S3_SECRET_ACCESS_KEY=test
      - BILLING_RETRY_S3_ENABLED=true
      - BILLING_RETRY_S3_PREFIX=billing-retries
      - BILLING_RETRY_INTERVAL=15
    depends_on:
      - redis
      - postgres
      - localstack
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: redis-local
    restart: always

  localstack:
    image: localstack/localstack:latest
    container_name: localstack-local
    restart: always
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack

  localstack-init:
    image: amazon/aws-cli:latest
    container_name: localstack-init
    depends_on:
      - localstack
    entrypoint: /bin/sh
    command: >
      -c "
      until aws --endpoint-url=http://localstack:4566 s3 ls 2>/dev/null; do
        echo 'Waiting for LocalStack...'; sleep 2;
      done;
      aws --endpoint-url=http://localstack:4566 s3 mb s3://test-logs 2>/dev/null || true;
      echo 'Bucket test-logs ready';
      "
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1

  postgres:
    image: postgres:15
    container_name: postgres-local
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new-api
      POSTGRES_SHARED_BUFFERS: 128MB
      POSTGRES_WORK_MEM: 4MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 256MB
    volumes:
      - pg_data_local:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

volumes:
  pg_data_local:
  localstack_data:
